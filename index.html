<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Hitler Simulation</title>
    <style>
        :root {
            /* Semantic: Fascist (Red) */
            --color-fascist: #ef4444;
            --color-fascist-dark: #dc2626;
            --color-fascist-darker: #991b1b;
            --color-fascist-shadow: rgba(220, 38, 38, 0.4);

            /* Semantic: Liberal (Blue) */
            --color-liberal: #3b82f6;
            --color-liberal-dark: #2563eb;
            --color-liberal-darker: #1d4ed8;
            --color-liberal-shadow: rgba(59, 130, 246, 0.4);

            /* Surfaces */
            --color-bg-start: #1a1a2e;
            --color-bg-end: #16213e;
            --color-table-start: #2d3748;
            --color-table-end: #1a202c;
            --color-panel: rgba(30, 41, 59, 0.9);
            --color-panel-light: rgba(30, 41, 59, 0.8);
            --color-surface: #374151;
            --color-surface-elevated: #4a5568;
            --color-surface-dark: #1f2937;

            /* Text */
            --color-text: #fff;
            --color-text-secondary: #e2e8f0;
            --color-text-tertiary: #94a3b8;
            --color-text-muted: #64748b;
            --color-text-disabled: #475569;

            /* Accents */
            --color-president-start: #f59e0b;
            --color-president-end: #d97706;
            --color-chancellor-start: #92c065;
            --color-chancellor-end: #8ebc60;

            /* Buttons */
            --color-btn-secondary-start: #4b5563;
            --color-btn-tertiary-start: #6b7280;

            /* Suspicion Gradient */
            --color-suspicion-low: #74806b;
            --color-suspicion-high: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
            min-height: 100vh;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        /* Game info panel - compact horizontal display */
        .game-info {
            background: var(--color-panel);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .deck-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .deck-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deck-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .deck-dot.fascist {
            background: var(--color-fascist);
        }

        .deck-dot.liberal {
            background: var(--color-liberal);
        }

        .deck-value {
            font-weight: 600;
        }

        .deck-value.fascist {
            color: var(--color-fascist);
        }

        .deck-value.liberal {
            color: var(--color-liberal);
        }

        .deck-est {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }

        .policy-enacted {
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 90px;
            text-align: center;
        }

        .policy-enacted.BAD {
            background: linear-gradient(145deg, var(--color-fascist-dark) 0%, var(--color-fascist-darker) 100%);
        }

        .policy-enacted.GOOD {
            background: linear-gradient(145deg, var(--color-liberal-dark) 0%, var(--color-liberal-darker) 100%);
        }

        .policy-enacted.hidden {
            background: var(--color-surface-elevated);
            color: var(--color-text-muted);
        }

        /* Player grid - 2x3 layout */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 15px;
        }

        .player-card {
            background: var(--color-panel-light);
            border-radius: 10px;
            padding: 12px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-template-rows: auto auto;
            gap: 6px;
            align-items: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .player-card:hover {
            background: var(--color-panel);
        }

        .player-card.is-president {
            border-color: var(--color-president-start);
        }

        .player-card.is-chancellor {
            border-color: var(--color-chancellor-start);
        }

        .player-header {
            display: contents;
        }

        .player-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .player-role {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
            justify-self: end;
        }

        .player-role.president {
            background: linear-gradient(145deg, var(--color-president-start) 0%, var(--color-president-end) 100%);
            color: #000;
        }

        .player-role.chancellor {
            background: linear-gradient(145deg, var(--color-chancellor-start) 0%, var(--color-chancellor-end) 100%);
            color: #000;
        }

        .player-role.none {
            visibility: hidden;
        }

        .policy-cards {
            display: inline-flex;
            gap: 2px;
            justify-self: center;
            align-items: center;
        }

        .policy-card {
            width: 10px;
            height: 15px;
            border-radius: 2px;
        }

        .policy-card.fascist {
            background: var(--color-fascist);
        }

        .policy-card.liberal {
            background: var(--color-liberal);
        }

        .policy-card.discarded {
            position: relative;
        }

        .policy-card.discarded::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(to top right, transparent calc(50% - 1px), black calc(50% - 1px), black calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(to top left, transparent calc(50% - 1px), black calc(50% - 1px), black calc(50% + 1px), transparent calc(50% + 1px));
        }

        .policy-card.selected {
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
        }

        .player-stats {
            display: contents;
        }

        .player-identity {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .player-identity.identity-liberal {
            color: var(--color-liberal);
        }

        .player-identity.identity-fascist {
            color: var(--color-fascist);
        }

        .player-identity.identity-hitler {
            color: #ef4444;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .player-prob {
            font-size: 0.8rem;
            color: var(--color-text-tertiary);
            transition: color 0.5s ease;
            justify-self: center;
            text-align: center;
        }

        .player-vote {
            opacity: 0;
            transition: opacity 0.3s ease;
            min-height: 20px;
            min-width: 42px;
            text-align: end;
            display: inline-block;
            justify-self: end;
        }

        .player-vote.visible {
            opacity: 1;
        }

        .vote-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .vote-badge.ja {
            background: linear-gradient(145deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .vote-badge.nein {
            background: linear-gradient(145deg, var(--color-fascist) 0%, var(--color-fascist-dark) 100%);
            color: white;
        }

        /* Policy Boards - horizontal compact */
        .policy-boards {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .policy-board {
            border-radius: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
        }

        .policy-board.liberal {
            background: linear-gradient(145deg, var(--color-liberal-dark) 0%, var(--color-liberal-darker) 100%);
            box-shadow: 0 4px 15px var(--color-liberal-shadow);
        }

        .policy-board.fascist {
            background: linear-gradient(145deg, var(--color-fascist-dark) 0%, var(--color-fascist-darker) 100%);
            box-shadow: 0 4px 15px var(--color-fascist-shadow);
        }

        .policy-board-title {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 2px 10px;
            border-radius: 6px;
            z-index: 11;
        }

        .policy-board.liberal .policy-board-title {
            background: var(--color-liberal-darker);
            color: var(--color-text);
        }

        .policy-board.fascist .policy-board-title {
            background: var(--color-fascist-darker);
            color: var(--color-text);
        }

        .policy-slot {
            width: 32px;
            height: 44px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .policy-slot.filled {
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .policy-board.winner {
            animation: pulse-win 1s ease infinite;
        }

        @keyframes pulse-win {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .win-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .win-message.liberal-win,
        .win-message.fascist-win {
            display: flex;
        }

        /* Control panel */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
            min-width: 48px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(145deg, var(--color-liberal) 0%, var(--color-liberal-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px var(--color-liberal-shadow);
        }

        .btn-prev {
            background: linear-gradient(145deg, var(--color-btn-tertiary-start) 0%, var(--color-btn-secondary-start) 100%);
            color: white;
        }

        .round-counter {
            font-size: 0.9rem;
            color: var(--color-text-tertiary);
        }

        /* Policy history */
        .policy-history {
            display: flex;
            gap: 4px;
            flex-basis: 100%;
            justify-content: center;
        }

        .history-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .history-dot.BAD {
            background: var(--color-fascist-dark);
        }

        .history-dot.GOOD {
            background: var(--color-liberal-dark);
        }

        .history-dot.empty {
            background: var(--color-surface);
            border: 1px dashed var(--color-surface-elevated);
        }

        .history-dot.FAILED {
            background: #000000;
        }

        .game-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #seed-input {
            padding: 8px 10px;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            background: var(--color-surface);
            color: var(--color-text);
            width: 110px;
        }

        .seed-display {
            margin-top: 10px;
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        /* Executed players */
        .player-card.is-executed {
            opacity: 0.45;
        }

        .player-card.is-executed .player-name {
            text-decoration: line-through;
        }

        .player-card.is-executed .player-name::after {
            content: ' 💀';
            text-decoration: none;
            display: inline;
        }

        /* Executive action badge */
        .executive-action-badge {
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .executive-action-badge.peek {
            background: linear-gradient(145deg, #6366f1 0%, #4f46e5 100%);
        }

        .executive-action-badge.execution {
            background: linear-gradient(145deg, var(--color-fascist-dark) 0%, var(--color-fascist-darker) 100%);
        }

        .veto-badge {
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            background: linear-gradient(145deg, #78716c 0%, #57534e 100%);
        }

        /* Fascist board power icons */
        .policy-slot {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .power-icon {
            font-size: 0.6rem;
            opacity: 0.4;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .power-icon.bullet {
            display: inline-block;
            width: 10px;
            height: 24px;
            background: rgba(255, 255, 255, 0.5);
            clip-path: polygon(
                50% 0%, 47% 3%, 44% 7%, 40% 11%, 37% 15%, 35% 19%, 34% 23%,
                33.5% 27%, 33.5% 33%, 32% 34%, 32% 39%, 33% 40%, 31% 43%, 29% 46%,
                29% 90%, 31% 91%, 31% 93%, 28% 93.5%, 28% 95%, 27% 95.5%, 27% 100%,
                73% 100%, 73% 95.5%, 72% 95%, 72% 93.5%, 69% 93%, 69% 91%, 71% 90%,
                71% 46%, 69% 43%, 67% 40%, 68% 39%, 68% 34%, 66.5% 33%, 66.5% 27%,
                66% 23%, 65% 19%, 63% 15%, 60% 11%, 56% 7%, 53% 3%
            );
            font-size: 0;
            transform: translate(-50%, -50%) rotate(30deg);
        }

        .power-icon.policy-peek {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 18px;
            height: 22px;
            gap: 1px;
            font-size: 0;
            transform: translate(-50%, -50%);
        }

        .power-icon.policy-peek .peek-plate {
            width: 80%;
            height: 12%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1px;
            transform: skewX(-20deg);
            flex-shrink: 0;
        }

        .power-icon.policy-peek .peek-base {
            width: 90%;
            height: 25%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1px 1px 2px 2px;
            flex-shrink: 0;
        }

        .policy-slot.filled .power-icon {
            display: none;
        }

        /* Veto dots in policy history */
        .history-dot.VETO {
            background: transparent;
            border: 2px solid var(--color-text-muted);
            position: relative;
        }

        .history-dot.VETO::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -1px;
            right: -1px;
            height: 2px;
            background: var(--color-text-muted);
            transform: rotate(-45deg);
        }

        /* =================================================================
           RESPONSIVE STYLES
           ================================================================= */

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .player-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .game-info {
                padding: 10px 15px;
                gap: 12px;
            }

            .policy-boards {
                gap: 10px;
            }

            .policy-slot {
                width: 28px;
                height: 38px;
            }

            .policy-card {
                width: 8px;
                height: 12px;
            }

            button {
                padding: 12px 24px;
                font-size: 1rem;
                min-height: 52px;
                min-width: 52px;
            }
        }

        @media (max-width: 400px) {
            .player-grid {
                grid-template-columns: 1fr;
            }

            .player-card {
                grid-template-columns: auto 1fr auto;
            }

            .policy-boards {
                gap: 20px;
            }
        }

        /* Tutorial overlay system */
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            pointer-events: auto;
        }

        .tutorial-overlay.hidden {
            display: none;
        }

        .tutorial-spotlight {
            position: absolute;
            z-index: 2001;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.75);
            transition: top 0.3s ease, left 0.3s ease, width 0.3s ease, height 0.3s ease;
            pointer-events: none;
        }

        .tutorial-spotlight.hidden {
            display: none;
        }

        .tutorial-highlighted {
            position: relative;
            z-index: 2002;
        }

        .tutorial-tooltip {
            position: fixed;
            z-index: 2003;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 380px;
            width: 90vw;
            color: #e2e8f0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: top 0.3s ease, left 0.3s ease;
        }

        .tutorial-step-indicator {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tutorial-text {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .tutorial-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .tutorial-btn-skip {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .tutorial-btn-skip:hover {
            background: rgba(71, 85, 105, 0.3);
        }

        .tutorial-btn-next {
            background: linear-gradient(145deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .tutorial-btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body>
    <!-- Tutorial overlay -->
    <div class="tutorial-overlay hidden" id="tutorial-overlay"></div>
    <div class="tutorial-spotlight hidden" id="tutorial-spotlight"></div>
    <div class="tutorial-tooltip" id="tutorial-tooltip" style="display: none;">
        <div class="tutorial-step-indicator" id="tutorial-step-indicator"></div>
        <div class="tutorial-text" id="tutorial-text"></div>
        <div class="tutorial-buttons">
            <button class="tutorial-btn-skip" onclick="tutorialSkip()">Skip</button>
            <button class="tutorial-btn-next" id="tutorial-btn-next" onclick="tutorialNext()">Next</button>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="color: white; font-size: 1.2rem; margin-bottom: 15px;" id="loading-text">Loading Pyodide...</div>
        <div style="width: 200px; height: 4px; background: #374151; border-radius: 2px; overflow: hidden;">
            <div id="loading-bar" style="width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s ease;"></div>
        </div>
    </div>

    <!-- Game Info Panel -->
    <div class="game-info">
        <div class="deck-info">
            <div class="deck-item">
                <span class="deck-dot fascist"></span>
                <span class="deck-value fascist" id="deck-fascist">11</span>
                <span class="deck-est">(<span id="deck-fascist-est">~11</span>)</span>
            </div>
            <div class="deck-item">
                <span class="deck-dot liberal"></span>
                <span class="deck-value liberal" id="deck-liberal">6</span>
                <span class="deck-est">(<span id="deck-liberal-est">~6</span>)</span>
            </div>
        </div>
        <div class="policy-enacted hidden" id="policy-enacted"> — </div>
        <div id="executive-action"></div>
        <div class="policy-history" id="policy-history"></div>
    </div>

    <!-- Player Grid -->
    <div class="player-grid" id="player-grid">
        <div class="player-card" id="player-0">
            <div class="player-header">
                <span class="player-name">Player 0</span>
                <span class="policy-cards" id="cards-0"></span>
                <span class="player-role none" id="role-0"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-0">Liberal</span>
                <span class="player-prob" id="prob-0">33.3%</span>
                <span class="player-vote" id="vote-0"></span>
            </div>
        </div>
        <div class="player-card" id="player-1">
            <div class="player-header">

    <script>
        const ColorConfig = {
            getCSSVar(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            },
            hexToRGB(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            },
            _cache: {},
            getSuspicionColors() {
                if (!this._cache.suspicion) {
                    this._cache.suspicion = {
                        low: this.hexToRGB(this.getCSSVar('--color-suspicion-low')),
                        high: this.hexToRGB(this.getCSSVar('--color-suspicion-high'))
                    };
                }
                return this._cache.suspicion;
            }
        };

        let gameData = null;
        let currentRound = -1;

        function initializeGame() {
            currentRound = -1;
            updateDisplay();
            document.getElementById('round-counter').textContent =
                `Round 0 of ${gameData.rounds.length}`;
        }

        function prevRound() {
            if (currentRound >= 0) {
                currentRound--;
                updateDisplay();
            }
        }

        function nextRound() {
            if (currentRound < gameData.rounds.length - 1) {
                currentRound++;
                updateDisplay();
            }
        }

        function updateDisplay() {
            const totalRounds = gameData.rounds.length;

            let beliefs, deckExpected, actualDeck, presidentId, chancellorId, enacted;
            let executedPlayers = [];
            let round = null;

            if (currentRound === -1) {
                beliefs = gameData.initial_state.player_beliefs;
                deckExpected = gameData.initial_state.deck_expected;
                actualDeck = gameData.initial_state.actual_deck || gameData.config.initial_deck;
                presidentId = null;
                chancellorId = null;
                enacted = null;
            } else {
                round = gameData.rounds[currentRound];
                beliefs = round.player_beliefs;
                deckExpected = round.deck_expected;
                actualDeck = round.actual_deck;
                presidentId = round.president_id;
                chancellorId = round.chancellor_id;
                enacted = round.enacted;
                executedPlayers = round.executed_players || [];
            }

            document.getElementById('round-counter').textContent =
                `Round ${currentRound + 1} of ${totalRounds}`;

            const policyEnacted = document.getElementById('policy-enacted');
            if (round && round.veto_proposed && round.veto_accepted && !round.chaos) {
                policyEnacted.textContent = 'Vetoed';
                policyEnacted.className = 'policy-enacted hidden';
            } else if (enacted) {
                policyEnacted.textContent = enacted === 'BAD' ? 'Fascist' : 'Liberal';
                policyEnacted.className = `policy-enacted ${enacted}`;
            } else {
                policyEnacted.textContent = '—';
                policyEnacted.className = 'policy-enacted hidden';
            }

            // Executive action badge
            const execActionEl = document.getElementById('executive-action');
            if (round && round.executive_action === 'POLICY_PEEK' && round.policy_peek) {
                const cards = round.policy_peek.map(c => c === 'BAD' ? 'F' : 'L').join(' ');
                execActionEl.innerHTML = `<div class="executive-action-badge peek">Peek: ${cards}</div>`;
            } else if (round && round.executive_action === 'EXECUTION' && round.executed_player !== undefined) {
                execActionEl.innerHTML = `<div class="executive-action-badge execution">💀 Executed P${round.executed_player}</div>`;
            } else if (round && round.veto_proposed) {
                const vetoText = round.veto_accepted ? 'Veto Accepted' : 'Veto Rejected';
                execActionEl.innerHTML = `<div class="veto-badge">${vetoText}</div>`;
            } else {
                execActionEl.innerHTML = '';
            }

            const fascistPlayers = gameData.config.fascist_players || [];
            const hitlerId = gameData.config.hitler_id;
            for (let i = 0; i < 6; i++) {
                const prob = beliefs[i.toString()];
                const isFascist = fascistPlayers.includes(i);
                const isHitler = i === hitlerId;
                const isExecuted = executedPlayers.includes(i);
                updatePlayerCard(i, prob, i === presidentId, i === chancellorId, isFascist, isHitler, isExecuted);
            }

            if (actualDeck) {
                document.getElementById('deck-fascist').textContent = actualDeck.fascist;
                document.getElementById('deck-liberal').textContent = actualDeck.liberal;
                document.getElementById('deck-fascist-est').textContent = `~${deckExpected.fascist.toFixed(0)}`;
                document.getElementById('deck-liberal-est').textContent = `~${deckExpected.liberal.toFixed(0)}`;
            } else {
                document.getElementById('deck-fascist').textContent = '—';
                document.getElementById('deck-liberal').textContent = '—';
                document.getElementById('deck-fascist-est').textContent = '—';
                document.getElementById('deck-liberal-est').textContent = '—';
            }

            updatePolicyHistory();
            updatePolicyBoards();

            const isGameOver = currentRound >= 0 && !!gameData.rounds[currentRound].game_over;
            document.getElementById('btn-prev').disabled = tutorialActive || currentRound < 0;
            document.getElementById('btn-next').disabled = tutorialActive || currentRound >= totalRounds - 1 || isGameOver;
            document.getElementById('btn-new-game').disabled = tutorialActive;

            const seedValue = gameData.config.seed;
            document.getElementById('seed-value').textContent = seedValue !== undefined ? seedValue : '—';

            renderVotes();
            renderCards();
        }

        function getGradientColor(probability) {
            const { low, high } = ColorConfig.getSuspicionColors();
            const r = Math.round(low.r + (high.r - low.r) * probability);
            const g = Math.round(low.g + (high.g - low.g) * probability);
            const b = Math.round(low.b + (high.b - low.b) * probability);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function updatePlayerCard(playerId, probability, isPresident, isChancellor, isFascist, isHitler, isExecuted) {
            const cardEl = document.getElementById(`player-${playerId}`);
            const probEl = document.getElementById(`prob-${playerId}`);
            const identityEl = document.getElementById(`identity-${playerId}`);
            const roleEl = document.getElementById(`role-${playerId}`);

            // Handle executed players
            cardEl.classList.toggle('is-executed', !!isExecuted);
            if (isExecuted) {
                probEl.textContent = '';
                probEl.style.color = '';
                roleEl.textContent = '';
                roleEl.className = 'player-role none';
                cardEl.classList.remove('is-president', 'is-chancellor');
                return;
            }

            // Update probability text
            const pct = (probability * 100).toFixed(1);
            probEl.textContent = `${pct}%`;

            // Update color
            const color = getGradientColor(probability);
            probEl.style.color = color;

            // Update card border for president/chancellor
            cardEl.classList.remove('is-president', 'is-chancellor');
            if (isPresident) {
                cardEl.classList.add('is-president');
                roleEl.textContent = 'P';
                roleEl.className = 'player-role president';
            } else if (isChancellor) {
                cardEl.classList.add('is-chancellor');
                roleEl.textContent = 'C';
                roleEl.className = 'player-role chancellor';
            } else {
                roleEl.textContent = '';
                roleEl.className = 'player-role none';
            }

            // Update identity
            if (identityEl) {
                if (isHitler) {
                    identityEl.textContent = 'Hitler';
                    identityEl.classList.remove('identity-fascist', 'identity-liberal');
                    identityEl.classList.add('identity-hitler');
                } else {
                    identityEl.textContent = isFascist ? 'Fascist' : 'Liberal';
                    identityEl.classList.remove('identity-hitler');
                    identityEl.classList.toggle('identity-fascist', isFascist);
                    identityEl.classList.toggle('identity-liberal', !isFascist);
                }
            }
        }

        function updatePolicyHistory() {
            const historyContainer = document.getElementById('policy-history');
            const totalRounds = gameData.rounds.length;

            let html = '';
            for (let i = 0; i < totalRounds; i++) {
                if (i <= currentRound && currentRound >= 0) {
                    const r = gameData.rounds[i];
                    let dotClass;
                    if (r.enacted) {
                        dotClass = r.enacted;
                    } else if (r.veto_proposed && r.veto_accepted && !r.chaos) {
                        dotClass = 'VETO';
                    } else {
                        dotClass = 'FAILED';
                    }
                    html += `<div class="history-dot ${dotClass}"></div>`;
                } else {
                    html += `<div class="history-dot empty"></div>`;
                }
            }
            historyContainer.innerHTML = html;
        }

        function updatePolicyBoards() {
            let liberalCount = 0;
            let fascistCount = 0;

            if (currentRound >= 0) {
                const round = gameData.rounds[currentRound];
                if (round.policies_enacted) {
                    liberalCount = round.policies_enacted.liberal || 0;
                    fascistCount = round.policies_enacted.fascist || 0;
                } else {
                    // Fallback: manual counting for backward compat
                    for (let i = 0; i <= currentRound; i++) {
                        const policy = gameData.rounds[i].enacted;
                        if (policy === 'GOOD') liberalCount++;
                        else if (policy === 'BAD') fascistCount++;
                    }
                }
            }

            for (let i = 0; i < 5; i++) {
                const slot = document.getElementById(`liberal-slot-${i}`);
                slot.classList.toggle('filled', i < liberalCount);
            }

            for (let i = 0; i < 6; i++) {
                const slot = document.getElementById(`fascist-slot-${i}`);
                slot.classList.toggle('filled', i < fascistCount);
            }

            let winner = null;
            let winCondition = null;
            if (currentRound >= 0 && gameData.rounds[currentRound].game_over) {
                winner = gameData.rounds[currentRound].winner;
                winCondition = gameData.rounds[currentRound].win_condition || '';
            }

            const liberalBoard = document.getElementById('liberal-board');
            const fascistBoard = document.getElementById('fascist-board');
            const liberalWin = liberalCount >= 5 || winner === 'LIBERAL';
            const fascistWin = fascistCount >= 6 || winner === 'FASCIST';
            liberalBoard.classList.toggle('winner', liberalWin);
            fascistBoard.classList.toggle('winner', fascistWin);

            const liberalWinMessage = document.getElementById('liberal-win-message');
            const fascistWinMessage = document.getElementById('fascist-win-message');

            liberalWinMessage.className = 'win-message';
            fascistWinMessage.className = 'win-message';

            if (liberalWin) {
                liberalWinMessage.textContent = 'Liberals Win!';
                liberalWinMessage.classList.add('liberal-win');
            }
            if (fascistWin) {
                fascistWinMessage.textContent = 'Fascists Win!';
                fascistWinMessage.classList.add('fascist-win');
            }
        }

        function renderVotes() {
            for (let i = 0; i < 6; i++) {
                const container = document.getElementById(`vote-${i}`);
                container.innerHTML = '';
                container.classList.remove('visible');
            }

            if (currentRound === -1) return;

            const round = gameData.rounds[currentRound];
            const votes = round.votes;
            if (!votes) return;

            for (let playerId = 0; playerId < 6; playerId++) {
                const vote = votes[playerId.toString()];
                if (!vote) continue;

                const container = document.getElementById(`vote-${playerId}`);
                const voteClass = vote === 'JA' ? 'ja' : 'nein';

                container.innerHTML = `<span class="vote-badge ${voteClass}">${vote}</span>`;
                container.classList.add('visible');
            }
        }

        function computeCards(round) {
            // No cards for non-legislative rounds, failed elections, chaos,
            // veto-accepted (without chaos enactment), or Hitler-chancellor-win
            if (!round) return null;
            if (!round.actual_draw) return null;
            if (!round.vote_passed) return null;
            if (round.chaos) return null;
            if (round.veto_proposed && round.veto_accepted) return null;
            // Hitler-chancellor-win has no enacted policy and game_over
            if (round.game_over && !round.enacted) return null;

            const draw = round.actual_draw;
            const presidentId = round.president_id;
            const chancellorId = round.chancellor_id;

            const fascistPlayers = gameData.config.fascist_players || [];
            const hitlerId = gameData.config.hitler_id;
            const presIsFascist = fascistPlayers.includes(presidentId) || presidentId === hitlerId;
            const chancIsFascist = fascistPlayers.includes(chancellorId) || chancellorId === hitlerId;

            // Build the 3-card draw as an array of types
            const drawnCards = [];
            for (let i = 0; i < draw.fascist; i++) drawnCards.push('fascist');
            for (let i = 0; i < draw.liberal; i++) drawnCards.push('liberal');

            // President discards 1 card (mirrors president_passes in core.py)
            // Liberal: discards fascist first; Fascist: discards liberal first
            let fascistDiscarded, liberalDiscarded;
            if (presIsFascist) {
                liberalDiscarded = Math.min(draw.liberal, 1);
                fascistDiscarded = 1 - liberalDiscarded;
            } else {
                fascistDiscarded = Math.min(draw.fascist, 1);
                liberalDiscarded = 1 - fascistDiscarded;
            }

            // Build president's 3 cards with discard state
            const presidentCards = [];
            let fDisc = fascistDiscarded, lDisc = liberalDiscarded;
            for (const type of drawnCards) {
                if (type === 'fascist' && fDisc > 0) {
                    presidentCards.push({ type, state: 'discarded' });
                    fDisc--;
                } else if (type === 'liberal' && lDisc > 0) {
                    presidentCards.push({ type, state: 'discarded' });
                    lDisc--;
                } else {
                    presidentCards.push({ type, state: 'normal' });
                }
            }

            // Chancellor receives 2 cards, enacts 1 (mirrors chancellor_enacts in core.py)
            const passedFascist = draw.fascist - fascistDiscarded;
            const passedLiberal = draw.liberal - liberalDiscarded;

            let enactedType;
            if (chancIsFascist) {
                enactedType = passedFascist > 0 ? 'fascist' : 'liberal';
            } else {
                enactedType = passedLiberal > 0 ? 'liberal' : 'fascist';
            }

            const chancellorCards = [];
            let enacted = false;
            const receivedCards = [];
            for (let i = 0; i < passedFascist; i++) receivedCards.push('fascist');
            for (let i = 0; i < passedLiberal; i++) receivedCards.push('liberal');

            for (const type of receivedCards) {
                if (!enacted && type === enactedType) {
                    chancellorCards.push({ type, state: 'selected' });
                    enacted = true;
                } else {
                    chancellorCards.push({ type, state: 'normal' });
                }
            }

            return { presidentId, chancellorId, presidentCards, chancellorCards };
        }

        function renderCards() {
            // Clear all card containers
            for (let i = 0; i < 6; i++) {
                document.getElementById(`cards-${i}`).innerHTML = '';
            }

            if (currentRound === -1) return;

            const round = gameData.rounds[currentRound];
            const cards = computeCards(round);
            if (!cards) return;

            // Render president's cards
            const presContainer = document.getElementById(`cards-${cards.presidentId}`);
            for (const card of cards.presidentCards) {
                const el = document.createElement('span');
                el.className = `policy-card ${card.type}${card.state === 'discarded' ? ' discarded' : ''}`;
                presContainer.appendChild(el);
            }

            // Render chancellor's cards
            const chancContainer = document.getElementById(`cards-${cards.chancellorId}`);
            for (const card of cards.chancellorCards) {
                const el = document.createElement('span');
                el.className = `policy-card ${card.type}${card.state === 'selected' ? ' selected' : ''}`;
                chancContainer.appendChild(el);
            }
        }

        // =====================================================================
        // PYODIDE INTEGRATION
        // =====================================================================

        let pyodide = null;
        let pyodideReady = false;

        const PYTHON_FILES = ['__init__.py', 'constants.py', 'core.py', 'simulation.py', 'generator.py'];

        const RUNNER_CODE = `
import json
from policy_game import generate_game

def run_simulation(seed=None):
    return json.dumps(generate_game(seed=seed))
`;

        async function loadPythonPackage(pyodide, loadingText) {
            pyodide.FS.mkdir('/policy_game');

            for (const filename of PYTHON_FILES) {
                loadingText.textContent = `Loading ${filename}...`;
                const response = await fetch(`src/policy_game/${filename}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${filename}: ${response.status}`);
                }
                const content = await response.text();
                pyodide.FS.writeFile(`/policy_game/${filename}`, content);
            }

            await pyodide.runPythonAsync(`
import sys
if '/' not in sys.path:
    sys.path.insert(0, '/')
`);
        }

        async function loadPyodideAndSetup() {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            const loadingBar = document.getElementById('loading-bar');

            overlay.style.display = 'flex';
            loadingBar.style.width = '10%';

            try {
                loadingText.textContent = 'Loading Pyodide runtime...';
                loadingBar.style.width = '30%';

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
                document.head.appendChild(script);

                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                });

                loadingText.textContent = 'Initializing Python...';
                loadingBar.style.width = '50%';

                pyodide = await loadPyodide();

                loadingText.textContent = 'Loading simulation code...';
                loadingBar.style.width = '60%';

                await loadPythonPackage(pyodide, loadingText);

                loadingBar.style.width = '90%';
                loadingText.textContent = 'Initializing simulation...';

                await pyodide.runPythonAsync(RUNNER_CODE);

                loadingBar.style.width = '100%';
                loadingText.textContent = 'Generating game...';

                pyodideReady = true;

                const result = await pyodide.runPythonAsync(`run_simulation(seed=${TUTORIAL_SEED})`);
                gameData = JSON.parse(result);
                currentRound = -1;
                updateDisplay();

                loadingText.textContent = 'Ready!';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    startTutorial();
                }, 300);

                console.log('Pyodide loaded and game generated!', gameData.config);
            } catch (error) {
                console.error('Failed to load Pyodide:', error);
                loadingText.textContent = 'Failed to load Python runtime.';
                loadingBar.style.background = '#ef4444';
            }
        }

        async function generateNewGame() {
            if (!pyodideReady) {
                alert('Python runtime is still loading. Please wait...');
                return;
            }

            const btn = document.getElementById('btn-new-game');
            const originalText = btn.textContent;
            btn.textContent = 'Generating...';
            btn.disabled = true;

            try {
                const seedInput = document.getElementById('seed-input').value.trim();
                let pythonCall;
                if (seedInput && !isNaN(parseInt(seedInput))) {
                    pythonCall = `run_simulation(seed=${parseInt(seedInput)})`;
                } else {
                    pythonCall = 'run_simulation()';
                }

                const result = await pyodide.runPythonAsync(pythonCall);
                gameData = JSON.parse(result);

                currentRound = -1;
                updateDisplay();

                console.log('New game generated!', gameData.config);
            } catch (error) {
                console.error('Failed to generate game:', error);
                alert('Failed to generate new game. See console for details.');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // Tutorial system
        const TUTORIAL_SEED = 1781793528;
        let tutorialActive = false;
        let tutorialStep = 0;
        let tutorialAutoTimer = null;

        const TUTORIAL_STEPS = [
            {
                target: null,
                position: 'center',
                text: '<strong>Welcome!</strong><br><br>This visualization simulates playing Secret Hitler to give an outside view of the bayesian probabilities that each player is facist.',
                button: 'Next'
            },
            {
                target: '.deck-info',
                position: 'below',
                text: '<strong>Deck Counts</strong><br><br>The numbers like <strong>11 (~11)</strong> mean: 11 actual fascist cards, with the Bayesian estimate of ~11 in parentheses. The estimate diverges from reality as hidden information accumulates.',
                button: 'Next'
            },
            {
                target: '.player-grid',
                position: 'below',
                text: '<strong>Player Cards</strong><br><br>Each player shows their estimated probability of being fascist. Everyone starts at 33.3% to show the prior from 2 fascists among 6 players.',
                button: 'Next'
            },
            {
                target: null,
                position: 'center',
                text: 'Advancing to Round 1...',
                button: null // auto-advance
            },
            {
                target: '.player-grid',
                position: 'below',
                text: '', // filled dynamically
                button: 'Next'
            },
            {
                target: null,
                position: 'center',
                text: '<strong>You\'re all set!</strong><br><br>Use <strong>Prev</strong> / <strong>Next</strong> to step through rounds, or <strong>New Game</strong> to generate a fresh simulation. You can also enter a seed for reproducible games.',
                button: 'Continue'
            }
        ];

        function computeRound1Text() {
            if (!gameData || !gameData.rounds || gameData.rounds.length === 0) {
                return 'Round 1 data is not available.';
            }
            const r = gameData.rounds[0];
            const pres = `Player ${r.president_id}`;
            const chanc = `Player ${r.chancellor_id}`;
            const policy = r.enacted === 'BAD' ? 'Fascist' : 'Liberal';

            let text = `<strong>Round 1 Update</strong><br><br>`;
            text += `<strong>${pres}</strong> (president) and <strong>${chanc}</strong> (chancellor) enacted a <strong>${policy}</strong> policy.`;
            text += `<br><br>Notice how the probabilities shifted — the Bayesian model updated its beliefs based on who was in government and what policy passed.`;
            return text;
        }

        function startTutorial() {
            tutorialActive = true;
            tutorialStep = 0;
            document.getElementById('tutorial-overlay').classList.remove('hidden');
            showTutorialStep();
        }

        function showTutorialStep() {
            const step = TUTORIAL_STEPS[tutorialStep];
            const overlay = document.getElementById('tutorial-overlay');
            const spotlight = document.getElementById('tutorial-spotlight');
            const tooltip = document.getElementById('tutorial-tooltip');
            const stepIndicator = document.getElementById('tutorial-step-indicator');
            const textEl = document.getElementById('tutorial-text');
            const nextBtn = document.getElementById('tutorial-btn-next');

            // Step indicator
            stepIndicator.textContent = `Step ${tutorialStep + 1} of ${TUTORIAL_STEPS.length}`;

            // Dynamic text for step 6
            const displayText = tutorialStep === 4 ? computeRound1Text() : step.text;
            textEl.innerHTML = displayText;

            // Button
            if (step.button === null) {
                nextBtn.style.display = 'none';
            } else {
                nextBtn.style.display = '';
                nextBtn.textContent = step.button;
            }

            const skipBtn = tooltip.querySelector('.tutorial-btn-skip');
            skipBtn.style.display = (tutorialStep === TUTORIAL_STEPS.length - 1) ? 'none' : '';

            // Remove previous highlight
            document.querySelectorAll('.tutorial-highlighted').forEach(el => {
                el.classList.remove('tutorial-highlighted');
            });

            if (step.target) {
                const targetEl = document.querySelector(step.target);
                if (targetEl) {
                    targetEl.classList.add('tutorial-highlighted');
                    const rect = targetEl.getBoundingClientRect();
                    const pad = 8;

                    spotlight.style.top = (rect.top - pad + window.scrollY) + 'px';
                    spotlight.style.left = (rect.left - pad) + 'px';
                    spotlight.style.width = (rect.width + pad * 2) + 'px';
                    spotlight.style.height = (rect.height + pad * 2) + 'px';
                    spotlight.classList.remove('hidden');

                    // Position tooltip
                    tooltip.style.display = '';
                    const tooltipRect = tooltip.getBoundingClientRect();

                    if (step.position === 'below') {
                        tooltip.style.top = (rect.bottom + 16 + window.scrollY) + 'px';
                        tooltip.style.left = Math.max(10, Math.min(
                            rect.left + rect.width / 2 - tooltipRect.width / 2,
                            window.innerWidth - tooltipRect.width - 10
                        )) + 'px';
                    } else {
                        // above
                        tooltip.style.top = (rect.top - tooltipRect.height - 16 + window.scrollY) + 'px';
                        tooltip.style.left = Math.max(10, Math.min(
                            rect.left + rect.width / 2 - tooltipRect.width / 2,
                            window.innerWidth - tooltipRect.width - 10
                        )) + 'px';
                    }
                }
            } else {
                spotlight.classList.add('hidden');
                // Center tooltip
                tooltip.style.display = '';
                const tooltipRect = tooltip.getBoundingClientRect();
                tooltip.style.top = (window.innerHeight / 2 - tooltipRect.height / 2 + window.scrollY) + 'px';
                tooltip.style.left = (window.innerWidth / 2 - tooltipRect.width / 2) + 'px';
            }

            // Auto-advance for step 5
            if (step.button === null) {
                tutorialAutoTimer = setTimeout(() => {
                    currentRound = 0;
                    updateDisplay();
                    tutorialNext();
                }, 1200);
            }
        }

        function tutorialNext() {
            if (tutorialAutoTimer) {
                clearTimeout(tutorialAutoTimer);
                tutorialAutoTimer = null;
            }
            tutorialStep++;
            if (tutorialStep >= TUTORIAL_STEPS.length) {
                endTutorial();
            } else {
                showTutorialStep();
            }
        }

        function tutorialSkip() {
            endTutorial();
        }

        function endTutorial() {
            if (tutorialAutoTimer) {
                clearTimeout(tutorialAutoTimer);
                tutorialAutoTimer = null;
            }
            tutorialActive = false;
            tutorialStep = 0;

            document.getElementById('tutorial-overlay').classList.add('hidden');
            document.getElementById('tutorial-spotlight').classList.add('hidden');
            document.getElementById('tutorial-tooltip').style.display = 'none';

            document.querySelectorAll('.tutorial-highlighted').forEach(el => {
                el.classList.remove('tutorial-highlighted');
            });

            // Re-enable buttons
            updateDisplay();
        }

        // Reposition on resize
        window.addEventListener('resize', () => {
            if (tutorialActive) {
                showTutorialStep();
            }
        });

        // Escape to dismiss
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && tutorialActive) {
                endTutorial();
            }
        });

        window.addEventListener('load', () => {
            setTimeout(loadPyodideAndSetup, 100);
        });
    </script>
</body>
</html>
