<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Hitler Simulation - Grid Layout</title>
    <style>
        :root {
            /* Semantic: Fascist (Red) */
            --color-fascist: #ef4444;
            --color-fascist-dark: #dc2626;
            --color-fascist-darker: #991b1b;
            --color-fascist-shadow: rgba(220, 38, 38, 0.4);

            /* Semantic: Liberal (Blue) */
            --color-liberal: #3b82f6;
            --color-liberal-dark: #2563eb;
            --color-liberal-darker: #1d4ed8;
            --color-liberal-shadow: rgba(59, 130, 246, 0.4);

            /* Surfaces */
            --color-bg-start: #1a1a2e;
            --color-bg-end: #16213e;
            --color-table-start: #2d3748;
            --color-table-end: #1a202c;
            --color-panel: rgba(30, 41, 59, 0.9);
            --color-panel-light: rgba(30, 41, 59, 0.8);
            --color-surface: #374151;
            --color-surface-elevated: #4a5568;
            --color-surface-dark: #1f2937;

            /* Text */
            --color-text: #fff;
            --color-text-secondary: #e2e8f0;
            --color-text-tertiary: #94a3b8;
            --color-text-muted: #64748b;
            --color-text-disabled: #475569;

            /* Accents */
            --color-president-start: #f59e0b;
            --color-president-end: #d97706;
            --color-chancellor-start: #92c065;
            --color-chancellor-end: #8ebc60;

            /* Buttons */
            --color-btn-secondary-start: #4b5563;
            --color-btn-tertiary-start: #6b7280;

            /* Suspicion Gradient */
            --color-suspicion-low: #74806b;
            --color-suspicion-high: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
            min-height: 100vh;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        /* Game info panel - compact horizontal display */
        .game-info {
            background: var(--color-panel);
            border-radius: 12px;
            padding: 12px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .deck-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .deck-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deck-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .deck-dot.fascist {
            background: var(--color-fascist);
        }

        .deck-dot.liberal {
            background: var(--color-liberal);
        }

        .deck-value {
            font-weight: 600;
        }

        .deck-value.fascist {
            color: var(--color-fascist);
        }

        .deck-value.liberal {
            color: var(--color-liberal);
        }

        .deck-est {
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }

        .policy-enacted {
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 90px;
            text-align: center;
        }

        .policy-enacted.BAD {
            background: linear-gradient(145deg, var(--color-fascist-dark) 0%, var(--color-fascist-darker) 100%);
        }

        .policy-enacted.GOOD {
            background: linear-gradient(145deg, var(--color-liberal-dark) 0%, var(--color-liberal-darker) 100%);
        }

        .policy-enacted.hidden {
            background: var(--color-surface-elevated);
            color: var(--color-text-muted);
        }

        /* Player grid - 2x3 layout */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 15px;
        }

        .player-card {
            background: var(--color-panel-light);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .player-card:hover {
            background: var(--color-panel);
        }

        .player-card.is-president {
            border-color: var(--color-president-start);
        }

        .player-card.is-chancellor {
            border-color: var(--color-chancellor-start);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .player-role {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .player-role.president {
            background: linear-gradient(145deg, var(--color-president-start) 0%, var(--color-president-end) 100%);
            color: #000;
        }

        .player-role.chancellor {
            background: linear-gradient(145deg, var(--color-chancellor-start) 0%, var(--color-chancellor-end) 100%);
            color: #000;
        }

        .player-role.none {
            display: none;
        }

        .player-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .player-identity {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .player-identity.identity-liberal {
            color: var(--color-liberal);
        }

        .player-identity.identity-fascist {
            color: var(--color-fascist);
        }

        .player-identity.identity-hitler {
            color: #ef4444;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .player-prob {
            font-size: 0.8rem;
            color: var(--color-text-tertiary);
            transition: color 0.5s ease;
        }

        .player-vote {
            opacity: 0;
            transition: opacity 0.3s ease;
            min-height: 15px;
            display: inline-block;
        }

        .player-vote.visible {
            opacity: 1;
        }

        .vote-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .vote-badge.ja {
            background: linear-gradient(145deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .vote-badge.nein {
            background: linear-gradient(145deg, var(--color-fascist) 0%, var(--color-fascist-dark) 100%);
            color: white;
        }

        /* Policy Boards - horizontal compact */
        .policy-boards {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .policy-board {
            border-radius: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
        }

        .policy-board.liberal {
            background: linear-gradient(145deg, var(--color-liberal-dark) 0%, var(--color-liberal-darker) 100%);
            box-shadow: 0 4px 15px var(--color-liberal-shadow);
        }

        .policy-board.fascist {
            background: linear-gradient(145deg, var(--color-fascist-dark) 0%, var(--color-fascist-darker) 100%);
            box-shadow: 0 4px 15px var(--color-fascist-shadow);
        }

        .policy-board-title {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 2px 10px;
            border-radius: 6px;
            z-index: 11;
        }

        .policy-board.liberal .policy-board-title {
            background: var(--color-liberal-darker);
            color: var(--color-text);
        }

        .policy-board.fascist .policy-board-title {
            background: var(--color-fascist-darker);
            color: var(--color-text);
        }

        .policy-slot {
            width: 32px;
            height: 44px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .policy-slot.filled {
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .policy-board.winner {
            animation: pulse-win 1s ease infinite;
        }

        @keyframes pulse-win {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .win-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .win-message.liberal-win,
        .win-message.fascist-win {
            display: flex;
        }

        /* Control panel */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
            min-width: 48px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(145deg, var(--color-liberal) 0%, var(--color-liberal-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px var(--color-liberal-shadow);
        }

        .btn-prev {
            background: linear-gradient(145deg, var(--color-btn-tertiary-start) 0%, var(--color-btn-secondary-start) 100%);
            color: white;
        }

        .round-counter {
            font-size: 0.9rem;
            color: var(--color-text-tertiary);
        }

        /* Policy history */
        .policy-history {
            display: flex;
            gap: 4px;
        }

        .history-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .history-dot.BAD {
            background: var(--color-fascist-dark);
        }

        .history-dot.GOOD {
            background: var(--color-liberal-dark);
        }

        .history-dot.empty {
            background: var(--color-surface);
            border: 1px dashed var(--color-surface-elevated);
        }

        .history-dot.FAILED {
            background: #000000;
        }

        .game-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #seed-input {
            padding: 8px 10px;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            background: var(--color-surface);
            color: var(--color-text);
            width: 110px;
        }

        .seed-display {
            margin-top: 10px;
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        /* =================================================================
           RESPONSIVE STYLES
           ================================================================= */

        @media (max-width: 500px) {
            body {
                padding: 10px;
            }

            .player-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .game-info {
                padding: 10px 15px;
                gap: 12px;
            }

            .policy-boards {
                gap: 10px;
            }

            .policy-slot {
                width: 28px;
                height: 38px;
            }

            button {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 450px) {
            .player-grid {
                grid-template-columns: 1fr;
            }

            .player-card {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
            }

            .player-header {
                width: 100%;
            }

            .player-stats {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="color: white; font-size: 1.2rem; margin-bottom: 15px;" id="loading-text">Loading Pyodide...</div>
        <div style="width: 200px; height: 4px; background: #374151; border-radius: 2px; overflow: hidden;">
            <div id="loading-bar" style="width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s ease;"></div>
        </div>
    </div>

    <!-- Game Info Panel -->
    <div class="game-info">
        <div class="deck-info">
            <div class="deck-item">
                <span class="deck-dot fascist"></span>
                <span class="deck-value fascist" id="deck-fascist">11</span>
                <span class="deck-est">(<span id="deck-fascist-est">~11</span>)</span>
            </div>
            <div class="deck-item">
                <span class="deck-dot liberal"></span>
                <span class="deck-value liberal" id="deck-liberal">6</span>
                <span class="deck-est">(<span id="deck-liberal-est">~6</span>)</span>
            </div>
        </div>
        <div class="policy-enacted hidden" id="policy-enacted"> — </div>
        <div class="policy-history" id="policy-history"></div>
    </div>

    <!-- Player Grid -->
    <div class="player-grid" id="player-grid">
        <div class="player-card" id="player-0">
            <div class="player-header">
                <span class="player-name">Player 0</span>
                <span class="player-role none" id="role-0"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-0">Liberal</span>
                <span class="player-prob" id="prob-0">33.3%</span>
                <span class="player-vote" id="vote-0"></span>
            </div>
        </div>
        <div class="player-card" id="player-1">
            <div class="player-header">
                <span class="player-name">Player 1</span>
                <span class="player-role none" id="role-1"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-1">Liberal</span>
                <span class="player-prob" id="prob-1">33.3%</span>
                <span class="player-vote" id="vote-1"></span>
            </div>
        </div>
        <div class="player-card" id="player-2">
            <div class="player-header">
                <span class="player-name">Player 2</span>
                <span class="player-role none" id="role-2"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-2">Liberal</span>
                <span class="player-prob" id="prob-2">33.3%</span>
                <span class="player-vote" id="vote-2"></span>
            </div>
        </div>
        <div class="player-card" id="player-3">
            <div class="player-header">
                <span class="player-name">Player 3</span>
                <span class="player-role none" id="role-3"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-3">Liberal</span>
                <span class="player-prob" id="prob-3">33.3%</span>
                <span class="player-vote" id="vote-3"></span>
            </div>
        </div>
        <div class="player-card" id="player-4">
            <div class="player-header">
                <span class="player-name">Player 4</span>
                <span class="player-role none" id="role-4"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-4">Liberal</span>
                <span class="player-prob" id="prob-4">33.3%</span>
                <span class="player-vote" id="vote-4"></span>
            </div>
        </div>
        <div class="player-card" id="player-5">
            <div class="player-header">
                <span class="player-name">Player 5</span>
                <span class="player-role none" id="role-5"></span>
            </div>
            <div class="player-stats">
                <span class="player-identity" id="identity-5">Liberal</span>
                <span class="player-prob" id="prob-5">33.3%</span>
                <span class="player-vote" id="vote-5"></span>
            </div>
        </div>
    </div>

    <!-- Policy Boards -->
    <div class="policy-boards">
        <div class="policy-board liberal" id="liberal-board">
            <div class="policy-board-title">Liberal</div>
            <div class="policy-slot" id="liberal-slot-0"></div>
            <div class="policy-slot" id="liberal-slot-1"></div>
            <div class="policy-slot" id="liberal-slot-2"></div>
            <div class="policy-slot" id="liberal-slot-3"></div>
            <div class="policy-slot" id="liberal-slot-4"></div>
            <div class="win-message" id="liberal-win-message"></div>
        </div>
        <div class="policy-board fascist" id="fascist-board">
            <div class="policy-board-title">Fascist</div>
            <div class="policy-slot" id="fascist-slot-0"></div>
            <div class="policy-slot" id="fascist-slot-1"></div>
            <div class="policy-slot" id="fascist-slot-2"></div>
            <div class="policy-slot" id="fascist-slot-3"></div>
            <div class="policy-slot" id="fascist-slot-4"></div>
            <div class="policy-slot" id="fascist-slot-5"></div>
            <div class="win-message" id="fascist-win-message"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-wrapper">
        <div class="controls">
            <span class="round-counter" id="round-counter">Round 0 of 5</span>
            <button class="btn-prev" id="btn-prev" onclick="prevRound()" disabled>Prev</button>
            <button class="btn-next" id="btn-next" onclick="nextRound()">Next</button>
        </div>
        <div class="game-controls">
            <input type="text" id="seed-input" placeholder="Seed">
            <button class="btn-new-game" id="btn-new-game" onclick="generateNewGame()" style="background: linear-gradient(145deg, #8b5cf6 0%, #7c3aed 100%); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);">New Game</button>
        </div>
    </div>

    <div class="seed-display">
        Seed: <span id="seed-value">—</span>
    </div>

    <script>
        const ColorConfig = {
            getCSSVar(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            },
            hexToRGB(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            },
            _cache: {},
            getSuspicionColors() {
                if (!this._cache.suspicion) {
                    this._cache.suspicion = {
                        low: this.hexToRGB(this.getCSSVar('--color-suspicion-low')),
                        high: this.hexToRGB(this.getCSSVar('--color-suspicion-high'))
                    };
                }
                return this._cache.suspicion;
            }
        };

        let gameData = null;
        let currentRound = -1;

        async function loadGameData() {
            try {
                const response = await fetch('game_data.json');
                gameData = await response.json();
                initializeGame();
            } catch (error) {
                console.error('Failed to load game data:', error);
            }
        }

        function initializeGame() {
            currentRound = -1;
            updateDisplay();
            document.getElementById('round-counter').textContent =
                `Round 0 of ${gameData.rounds.length}`;
        }

        function prevRound() {
            if (currentRound >= 0) {
                currentRound--;
                updateDisplay();
            }
        }

        function nextRound() {
            if (currentRound < gameData.rounds.length - 1) {
                currentRound++;
                updateDisplay();
            }
        }

        function updateDisplay() {
            const totalRounds = gameData.rounds.length;

            let beliefs, deckExpected, actualDeck, presidentId, chancellorId, enacted;

            if (currentRound === -1) {
                beliefs = gameData.initial_state.player_beliefs;
                deckExpected = gameData.initial_state.deck_expected;
                actualDeck = gameData.initial_state.actual_deck || gameData.config.initial_deck;
                presidentId = null;
                chancellorId = null;
                enacted = null;
            } else {
                const round = gameData.rounds[currentRound];
                beliefs = round.player_beliefs;
                deckExpected = round.deck_expected;
                actualDeck = round.actual_deck;
                presidentId = round.president_id;
                chancellorId = round.chancellor_id;
                enacted = round.enacted;
            }

            document.getElementById('round-counter').textContent =
                `Round ${currentRound + 1} of ${totalRounds}`;

            const policyEnacted = document.getElementById('policy-enacted');
            if (enacted) {
                policyEnacted.textContent = enacted === 'BAD' ? 'Fascist' : 'Liberal';
                policyEnacted.className = `policy-enacted ${enacted}`;
            } else {
                policyEnacted.textContent = '—';
                policyEnacted.className = 'policy-enacted hidden';
            }

            const fascistPlayers = gameData.config.fascist_players || [];
            const hitlerId = gameData.config.hitler_id;
            for (let i = 0; i < 6; i++) {
                const prob = beliefs[i.toString()];
                const isFascist = fascistPlayers.includes(i);
                const isHitler = i === hitlerId;
                updatePlayerCard(i, prob, i === presidentId, i === chancellorId, isFascist, isHitler);
            }

            if (actualDeck) {
                document.getElementById('deck-fascist').textContent = actualDeck.fascist;
                document.getElementById('deck-liberal').textContent = actualDeck.liberal;
                document.getElementById('deck-fascist-est').textContent = `~${deckExpected.fascist.toFixed(0)}`;
                document.getElementById('deck-liberal-est').textContent = `~${deckExpected.liberal.toFixed(0)}`;
            } else {
                document.getElementById('deck-fascist').textContent = '—';
                document.getElementById('deck-liberal').textContent = '—';
                document.getElementById('deck-fascist-est').textContent = '—';
                document.getElementById('deck-liberal-est').textContent = '—';
            }

            updatePolicyHistory();
            updatePolicyBoards();

            const isGameOver = currentRound >= 0 && !!gameData.rounds[currentRound].game_over;
            document.getElementById('btn-prev').disabled = currentRound < 0;
            document.getElementById('btn-next').disabled = currentRound >= totalRounds - 1 || isGameOver;

            const seedValue = gameData.config.seed;
            document.getElementById('seed-value').textContent = seedValue !== undefined ? seedValue : '—';

            renderVotes();
        }

        function getGradientColor(probability) {
            const { low, high } = ColorConfig.getSuspicionColors();
            const r = Math.round(low.r + (high.r - low.r) * probability);
            const g = Math.round(low.g + (high.g - low.g) * probability);
            const b = Math.round(low.b + (high.b - low.b) * probability);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function updatePlayerCard(playerId, probability, isPresident, isChancellor, isFascist, isHitler) {
            const cardEl = document.getElementById(`player-${playerId}`);
            const probEl = document.getElementById(`prob-${playerId}`);
            const identityEl = document.getElementById(`identity-${playerId}`);
            const roleEl = document.getElementById(`role-${playerId}`);

            // Update probability text
            const pct = (probability * 100).toFixed(1);
            probEl.textContent = `${pct}%`;

            // Update color
            const color = getGradientColor(probability);
            probEl.style.color = color;

            // Update card border for president/chancellor
            cardEl.classList.remove('is-president', 'is-chancellor');
            if (isPresident) {
                cardEl.classList.add('is-president');
                roleEl.textContent = 'P';
                roleEl.className = 'player-role president';
            } else if (isChancellor) {
                cardEl.classList.add('is-chancellor');
                roleEl.textContent = 'C';
                roleEl.className = 'player-role chancellor';
            } else {
                roleEl.textContent = '';
                roleEl.className = 'player-role none';
            }

            // Update identity
            if (identityEl) {
                if (isHitler) {
                    identityEl.textContent = 'Hitler';
                    identityEl.classList.remove('identity-fascist', 'identity-liberal');
                    identityEl.classList.add('identity-hitler');
                } else {
                    identityEl.textContent = isFascist ? 'Fascist' : 'Liberal';
                    identityEl.classList.remove('identity-hitler');
                    identityEl.classList.toggle('identity-fascist', isFascist);
                    identityEl.classList.toggle('identity-liberal', !isFascist);
                }
            }
        }

        function updatePolicyHistory() {
            const historyContainer = document.getElementById('policy-history');
            const totalRounds = gameData.rounds.length;

            let html = '';
            for (let i = 0; i < totalRounds; i++) {
                if (i <= currentRound && currentRound >= 0) {
                    const policy = gameData.rounds[i].enacted;
                    const dotClass = policy || 'FAILED';
                    html += `<div class="history-dot ${dotClass}"></div>`;
                } else {
                    html += `<div class="history-dot empty"></div>`;
                }
            }
            historyContainer.innerHTML = html;
        }

        function updatePolicyBoards() {
            let liberalCount = 0;
            let fascistCount = 0;

            if (currentRound >= 0) {
                for (let i = 0; i <= currentRound; i++) {
                    const policy = gameData.rounds[i].enacted;
                    if (policy === 'GOOD') liberalCount++;
                    else if (policy === 'BAD') fascistCount++;
                }
            }

            for (let i = 0; i < 5; i++) {
                const slot = document.getElementById(`liberal-slot-${i}`);
                slot.classList.toggle('filled', i < liberalCount);
            }

            for (let i = 0; i < 6; i++) {
                const slot = document.getElementById(`fascist-slot-${i}`);
                slot.classList.toggle('filled', i < fascistCount);
            }

            let winner = null;
            if (currentRound >= 0 && gameData.rounds[currentRound].game_over) {
                winner = gameData.rounds[currentRound].winner;
            }

            const liberalBoard = document.getElementById('liberal-board');
            const fascistBoard = document.getElementById('fascist-board');
            const liberalWin = liberalCount >= 5 || winner === 'LIBERAL';
            const fascistWin = fascistCount >= 6 || winner === 'FASCIST';
            liberalBoard.classList.toggle('winner', liberalWin);
            fascistBoard.classList.toggle('winner', fascistWin);

            const liberalWinMessage = document.getElementById('liberal-win-message');
            const fascistWinMessage = document.getElementById('fascist-win-message');

            liberalWinMessage.className = 'win-message';
            fascistWinMessage.className = 'win-message';

            if (liberalWin) {
                liberalWinMessage.textContent = 'Liberals Win!';
                liberalWinMessage.classList.add('liberal-win');
            }
            if (fascistWin) {
                fascistWinMessage.textContent = 'Fascists Win!';
                fascistWinMessage.classList.add('fascist-win');
            }
        }

        function renderVotes() {
            for (let i = 0; i < 6; i++) {
                const container = document.getElementById(`vote-${i}`);
                container.innerHTML = '';
                container.classList.remove('visible');
            }

            if (currentRound === -1) return;

            const round = gameData.rounds[currentRound];
            const votes = round.votes;
            if (!votes) return;

            for (let playerId = 0; playerId < 6; playerId++) {
                const vote = votes[playerId.toString()];
                if (!vote) continue;

                const container = document.getElementById(`vote-${playerId}`);
                const voteClass = vote === 'JA' ? 'ja' : 'nein';

                container.innerHTML = `<span class="vote-badge ${voteClass}">${vote}</span>`;
                container.classList.add('visible');
            }
        }

        loadGameData();

        // =====================================================================
        // PYODIDE INTEGRATION
        // =====================================================================

        let pyodide = null;
        let pyodideReady = false;

        const PYTHON_FILES = ['__init__.py', 'constants.py', 'core.py', 'simulation.py', 'generator.py'];

        const RUNNER_CODE = `
import json
from policy_game import generate_game

def run_simulation(seed=None):
    return json.dumps(generate_game(seed=seed))
`;

        async function loadPythonPackage(pyodide, loadingText) {
            pyodide.FS.mkdir('/policy_game');

            for (const filename of PYTHON_FILES) {
                loadingText.textContent = `Loading ${filename}...`;
                const response = await fetch(`src/policy_game/${filename}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${filename}: ${response.status}`);
                }
                const content = await response.text();
                pyodide.FS.writeFile(`/policy_game/${filename}`, content);
            }

            await pyodide.runPythonAsync(`
import sys
if '/' not in sys.path:
    sys.path.insert(0, '/')
`);
        }

        async function loadPyodideAndSetup() {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            const loadingBar = document.getElementById('loading-bar');

            overlay.style.display = 'flex';
            loadingBar.style.width = '10%';

            try {
                loadingText.textContent = 'Loading Pyodide runtime...';
                loadingBar.style.width = '30%';

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
                document.head.appendChild(script);

                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                });

                loadingText.textContent = 'Initializing Python...';
                loadingBar.style.width = '50%';

                pyodide = await loadPyodide();

                loadingText.textContent = 'Loading simulation code...';
                loadingBar.style.width = '60%';

                await loadPythonPackage(pyodide, loadingText);

                loadingBar.style.width = '90%';
                loadingText.textContent = 'Initializing simulation...';

                await pyodide.runPythonAsync(RUNNER_CODE);

                loadingBar.style.width = '100%';
                loadingText.textContent = 'Generating game...';

                pyodideReady = true;

                const result = await pyodide.runPythonAsync('run_simulation()');
                gameData = JSON.parse(result);
                currentRound = -1;
                updateDisplay();

                loadingText.textContent = 'Ready!';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);

                console.log('Pyodide loaded and game generated!', gameData.config);
            } catch (error) {
                console.error('Failed to load Pyodide:', error);
                loadingText.textContent = 'Failed to load Python runtime.';
                loadingBar.style.background = '#ef4444';
            }
        }

        async function generateNewGame() {
            if (!pyodideReady) {
                alert('Python runtime is still loading. Please wait...');
                return;
            }

            const btn = document.getElementById('btn-new-game');
            const originalText = btn.textContent;
            btn.textContent = 'Generating...';
            btn.disabled = true;

            try {
                const seedInput = document.getElementById('seed-input').value.trim();
                let pythonCall;
                if (seedInput && !isNaN(parseInt(seedInput))) {
                    pythonCall = `run_simulation(seed=${parseInt(seedInput)})`;
                } else {
                    pythonCall = 'run_simulation()';
                }

                const result = await pyodide.runPythonAsync(pythonCall);
                gameData = JSON.parse(result);

                currentRound = -1;
                updateDisplay();

                console.log('New game generated!', gameData.config);
            } catch (error) {
                console.error('Failed to generate game:', error);
                alert('Failed to generate new game. See console for details.');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        window.addEventListener('load', () => {
            setTimeout(loadPyodideAndSetup, 100);
        });
    </script>
</body>
</html>
